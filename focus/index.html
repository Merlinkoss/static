<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus - Master your time in the Void</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <meta name="description" content="A premium focus timer app to help you master your time.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --void-black: #0A0A0F;
            --void-surface: #12121A;
            --neon-blue: #00D4FF;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--void-black);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glow Background */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.03) 0%, rgba(10, 10, 15, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: breathe 8s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        main {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            z-index: 1;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            background: linear-gradient(180deg, #FFFFFF 0%, #94A3B8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.tagline {
            font-size: 1.25rem;
            color: var(--text-secondary);
            font-weight: 300;
            margin-bottom: 3rem;
            letter-spacing: 0.02em;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            background-color: var(--text-primary);
            color: var(--void-black);
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            border-radius: 9999px;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(0, 212, 255, 0.3);
            background-color: #FFFFFF;
        }

        .cta-button svg {
            width: 24px;
            height: 24px;
            margin-right: 0.75rem;
        }

        .cta-button::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg) translateX(-150%);
            transition: 0.5s;
        }

        .cta-button:hover::after {
            transform: skewX(-20deg) translateX(150%);
            transition: 0.5s;
        }

        footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        
        .mockup-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--void-surface), var(--void-black));
            border: 1px solid rgba(255,255,255,0.05);
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px -10px rgba(0, 212, 255, 0.1);
        }
        
        .logo-pulse {
             width: 40px;
             height: 40px;
             background-color: var(--neon-blue);
             border-radius: 50%;
             box-shadow: 0 0 20px var(--neon-blue);
             animation: pulse-dot 3s infinite;
        }

        @keyframes pulse-dot {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(0, 212, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); }
        }

    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <main>
        <div class="mockup-circle">
            <div class="logo-pulse"></div>
        </div>
        <h1>Focus</h1>
        <p class="tagline">Master your time in the Void.</p>

        <a href="https://play.google.com/store/apps/details?id=com.lamprof.focus" class="cta-button" target="_blank">
            Get it on Google Play
        </a>
    </main>

    <footer>
        &copy; 2026 Focus App
    </footer>

</body>
</html>
